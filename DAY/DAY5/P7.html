<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSL colors</title>
    <style>
        /* HSL colors: Hue[0-360](0:red,120:green,240:blue),
        (Saturation: 0-100% how vivid or gray the color is
        Lightness: 0-100% how light or dark the color is
        A: transparency (0-1)value) */
        p
        {
            /* 0-255 */
            color: hsl(300, 89%, 28%);
            font-size: x-large;

        }
        h1{
            /*Transperancy:0-1 */
            color: hsl(289, 99, 100, 0.23);
        }
    </style>
</head>
<body>
   <p>Paragraph</p>
   <h1>Heading 1</h1> 
</body>
</html>
