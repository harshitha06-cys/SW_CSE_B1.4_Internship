<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Units All in one example</title>
    <style>
        html{
            font-size: 16px;
        }
        body{
            font-size: 1rem;
            margin: 0;
            padding: 0;
        }
        .container{
            max-width: 1200px; /*fixed max width*/
            width: 90%; /*flexible within max-width*/
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        h1{
            font-size: 2.5rem;
            margin-bottom: 0.5; /*relative to parent tag*/
        }
        p{
            font-size: 1rem;
            line-height: 1.6;
            max-width: 60px;
        }
        .hero{
            height: 80vh; /*80% of viewport height*/
            font-size: 9vw; /*responsive text*/
            background-color: hotpink;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Vishruth</h1>

    </div>
    <div class="container">
        <h2>CSS Units</h2>
        <p>Example for CSS Units usage</p>
    </div>
</body>
</html>
