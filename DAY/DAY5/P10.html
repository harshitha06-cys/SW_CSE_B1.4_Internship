<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Styling</title>
    <style>
        h1{
            font-weight: bold;
            font-family: sans-serif;
        }
        span{
            font: italic bold 18px arial,sans-serif;
        }
        p{
            font-weight: 400;
        }
        em{
            font-style:oblique;
        }
        cite{
            font-style: italic;
        }

    </style>
</head>
<body>
    <!-- Text Styling: lets us control how text looks and behaves on a webpage.
        size, font, alignment, spacing and many more things.
        1.Font properties:
        >> font-familiy
        >>font-size 
        >>font-weight 
        >>font-style 
        >>font shorthand
     -->

    <h1>Font Styling</h1>
    <span>font shorthand representing line</span>
    <p> lets us control how <em>text looks and behaves</em> on a <cite>webpage</cite>.</p>
</body>
</html>
