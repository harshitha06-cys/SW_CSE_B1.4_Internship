<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Selector</title>
    <style>
        h1,h3,p{
            margin: 5;
            padding: 0;
            color: palevioletred;
        }
        h2,h4{
            margin: 5;
            padding: 0;
            color: rgb(135, 94, 240);
            background-color: olive;
        }


    </style>
</head>
<body>
    <h1>HEADING 1</h1>
    <h2>HEADING 2</h2>
    <h3>HEADING 3</h3>
    <h4>HEADING 4</h4>
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>
</body>
</html>
