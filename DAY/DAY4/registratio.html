<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrtion Form</title>
</head>
<body>
   <section id="Registrtion Form">
    <form>
        <fieldset>
            <legend>Registrtion Form</legend>

            <p>
                <label for="name">Name:</label><br>
                <input type="text", id="name" name="name">
            </p>
            <p>
                        <label for="email">Email:</label><br>
                        <input type="email" id="email" name="email">
            </p>
           
            <p>
                <label for="password">Password:</label><br>
                <input type="number", id="password" name="password">
            </p>

            <p>
                <label for="gender">Select Gender:</label><br>

                <input type="radio", name="gender", value="male">
                <label for="Male">Male</label><br>

                <input type="radio", name="gender", value="female">
                <label for="Female">Female</label><br>

                <input type="radio", name="gender", value="other">
                <label for="Other">Other</label><br>

            </p>

            <p>
                <label for="skills">Skills:</label><br>

                <input type="checkbox", name="skills", value="HTML">
                <label for="HTML">HTML</label><br>

                <input type="checkbox", name="skills", value="CSS">
                <label for="CSS">CSS</label><br>

                <input type="checkbox", name="skills", value="JavaScript">
                <label for="JavaScript">JavaScript</label><br>
            </p>

            <p>
                <label for="department">Department:</label><br>

                <select id="department" name="department" >
                    <option value="enter">Enter</option>
                    <option value="computer science">Computer Science</option>
                    <option value="information science">Information Science</option>
                    <option value="aiml">AIML</option>
                    <option value="cybersecurity">Cybersecurity</option>
                </select>
            </p>

            <p>
                
                <label for="file input">File Input:</label><br>

                <label for="resume">Resume:</label><br>
                <input type="file" id="resume" name="resume"><br><br>

                <label for="photo">Upload profile photo:</label><br>
                <input type="file" id="photo" name="photo">

            </p>
            
                <p>
                <label for="about yourself">About Yourself</label><br>
                <textarea name="about yourself" id="about yourself"></textarea>
                </p>

            <p>
                <label for="date inputs">Date inputs</label><br>
                <input type="date", id="date input", name="date inputs">
            </p>

            <input type="submit" value="submit">
      
    </form>

   </section> 
</body>
</html>
