<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Selector</title>
    <style>
        ul > li{
            color: palevioletred;
        }
        
    </style>
</head>
<body>
    <p>Targets elements that are direct children (one element down) other elements</p>
   <h1>HEADING 1</h1>
   <ul>
    <li>Physics</li>
    <li>Chemistry</li>
    <li>Biology</li>
    <li>Math</li>
   </ul>

</body>
</html>
