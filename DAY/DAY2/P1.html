<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tags</title>
    <style>
        .responsive-image {
            max-width:100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <!-- src: source alt: alternate text | Self-closing tag -->
    <img src="i1.jpg" alt="Could not find the image"> 
    <img src="images/i2.jpg" alt="Could not find the image"> 
    
    <!-- Common attributes & variations -->
     <!-- Width & height -->
    <!-- <img src="i1.jpg" alt="Could not find the image" width="200px" height="100px">  -->
    <!-- Tooltip -->
    <img src="i1.jpg" alt="Could not find the image" title="Image of a Flower"> 
    <!-- Style -->
    <img src="i1.jpg" alt="Could not find the image" 
    style="width:200px; height:100px; border-radius:50%; border:2px solid #f948b5;"> 

    <!-- Responsive image via CSS -->
    <img src="i1.jpg" alt="Could not find the image" class="responsive-image"> 
</body>
</html>
