<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table tags: Span row/col</title>
</head>
<body>
    <table border="1">
        <tr>
            <th colspan="3">
                Student Details
            </th>
        </tr>
        <tr>
            <td>Name</td>
            <td>Harshitha</td>
            <td>Ashoka</td>
        </tr>
        <tr>
            <td>Course</td>
            <td>Full stack Web Development</td>
            <td>Computer Networks</td>
        </tr>
    </table>
</body>
</html>
