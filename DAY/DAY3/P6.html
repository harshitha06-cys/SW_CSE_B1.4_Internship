<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML audio tag</title>
</head>
<body>
    <audio src="sample-3s.mp3" controls>
        Your browser does not support the audio tag
    </audio>
    <!-- Audio formats
     1. MP3
     2. OGG
     3. WAV
     -->

     <!-- Auto play -->
      <audio src="sample-3s.mp3"  autoplay controls>
        Your browser does not support the audio tag
    </audio>
    <!-- Muted -->
     <audio src="sample-3s.mp3"  muted controls>
        Your browser does not support the audio tag
    </audio>
    <!-- LOOPS -->
     <audio src="sample-3s.mp3" loop controls>
        Your browser does not support the audio tag
    </audio>

    <!-- Preload -->
    <!-- none: loads only when user starts playing;
      metadata: loads only information like duration, dimension.. etc.,
      auto: automatic browser, default - loads immediately  -->

      <audio src="sample-3s.mp3" preload="none" controls>
        Your browser does not support the audio tag
    </audio>

</body>
</html>
